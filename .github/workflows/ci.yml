name: Projet 7 pipeline
on: [push, pull_request]

env:
  FRONT_DIR: "front/"
  BACK_DIR: "back/"
  OWNER_LC: ""
  BRANCH: ""

jobs:
  test_front:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "front/package-lock.json"

      - name: Setup Angular
        run: npm ci
        working-directory: front/

      - name: Lancement des tests du front
        run: |
          chmod +x run-tests.sh
          ./run-tests.sh front

      - name: Rapport de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rapports-de-tests-front
          path: "test-results/*.xml"

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995
        with:
          projectBaseDir: front/
          args: >
            -Dsonar.projectKey=MllHlg_Projet7
            -Dsonar.organization=mllhlg
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  test_back:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"
      
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Lancement des tests du back
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          chmod +x run-tests.sh
          ./run-tests.sh back
          cd back && ./gradlew sonar --info

      - name: Rapport de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rapports-de-tests-back
          path: "test-results/*.xml"

  build_front:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    needs: test_front

    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Preparation des noms
        run: |
          echo "OWNER_LC=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "BRANCH=$(echo ${{ github.ref_name }} | tr '/' '-')" >> $GITHUB_ENV
      
      - name: Docker build Angular image
        run: docker build --target front -t ghcr.io/${{ env.OWNER_LC }}/orion-microcrm-front:${{ env.BRANCH }}-${{ github.sha }} -t ghcr.io/${{ env.OWNER_LC }}/orion-microcrm-front:latest .

      - name: Docker push Angular image
        run: |
          docker push ghcr.io/${{ env.OWNER_LC }}/orion-microcrm-front:${{ env.BRANCH }}-${{ github.sha }}
          docker push ghcr.io/${{ env.OWNER_LC }}/orion-microcrm-front:latest

  build_back:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    needs: test_back

    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Preparation des noms
        run: |
          echo "OWNER_LC=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "BRANCH=$(echo ${{ github.ref_name }} | tr '/' '-')" >> $GITHUB_ENV

      - name: Docker build Java image
        run: docker build --target back -t ghcr.io/${{ env.OWNER_LC }}/orion-microcrm-back:${{ env.BRANCH }}-${{ github.sha }} -t ghcr.io/${{ env.OWNER_LC }}/orion-microcrm-back:latest .

      - name: Docker push Java image
        run: |
          docker push ghcr.io/${{ env.OWNER_LC }}/orion-microcrm-back:${{ env.BRANCH }}-${{ github.sha }}
          docker push ghcr.io/${{ env.OWNER_LC }}/orion-microcrm-back:latest

  release:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    needs: [build_front, build_back]

    permissions:
      contents: write
      packages: write

    steps:
      - name: Récupération de tous l'historique des commits
        uses: actions/checkout@v4
        with: 
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'front/package-lock.json'

      - name: Login to Docker
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Preparation des noms
        run: |
          echo "OWNER_LC=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "BRANCH=$(echo ${{ github.ref_name }} | tr '/' '-')" >> $GITHUB_ENV

      - name: Lancement de semantic-release
        run: |
          npm install --no-save @semantic-release/changelog @semantic-release/exec @semantic-release/git
          npx semantic-release
        env: 
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}